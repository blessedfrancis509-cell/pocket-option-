<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achievements - Pocket Option</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Open Sans',sans-serif;background:#1b222f;color:#d1d4dc;min-height:100vh;display:flex}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#171e28}
::-webkit-scrollbar-thumb{background:#2a3444;border-radius:3px}
.sidebar{width:60px;background:#171e28;border-right:1px solid rgba(115,130,153,0.15);display:flex;flex-direction:column;align-items:center;padding:12px 0;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{width:36px;height:36px;background:linear-gradient(135deg,#00b6f9,#0090d9);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-weight:700;color:#fff;font-size:14px}
.sidebar-nav{display:flex;flex-direction:column;gap:4px;width:100%;align-items:center}
.sidebar-nav a{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:#5c6a7a;text-decoration:none;font-size:18px;transition:all .2s}
.sidebar-nav a:hover{background:rgba(0,182,249,0.1);color:#00b6f9}
.sidebar-nav a.active{background:rgba(0,182,249,0.15);color:#00b6f9}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;gap:4px;align-items:center}
.main{margin-left:60px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:56px;background:#171e28;border-bottom:1px solid rgba(115,130,153,0.15);display:flex;align-items:center;padding:0 24px;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-title{font-size:15px;font-weight:600}
.balance-display{display:flex;align-items:center;gap:8px;background:rgba(0,182,249,0.1);padding:6px 14px;border-radius:8px}
.balance-label{font-size:11px;color:#5c6a7a}
.balance-value{font-size:15px;font-weight:700;color:#00b6f9}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-btn{background:none;border:none;color:#5c6a7a;font-size:18px;cursor:pointer;padding:6px;border-radius:6px;transition:all .2s}
.topbar-btn:hover{color:#d1d4dc;background:rgba(255,255,255,0.05)}
.content{flex:1;padding:24px;max-width:1100px;width:100%}
.page-header{margin-bottom:24px}
.page-header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.page-header p{color:#5c6a7a;font-size:13px}

.level-banner{background:linear-gradient(135deg,#171e28 0%,#1a2840 100%);border:1px solid rgba(115,130,153,0.15);border-radius:12px;padding:24px;margin-bottom:20px;display:flex;align-items:center;gap:24px}
.level-badge{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#00b6f9,#0070c0);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 30px rgba(0,182,249,0.3)}
.level-badge-inner{width:68px;height:68px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff}
.level-info{flex:1}
.level-info h2{font-size:18px;font-weight:700;margin-bottom:4px}
.level-info p{color:#5c6a7a;font-size:13px;margin-bottom:10px}
.level-progress{height:8px;background:#1b222f;border-radius:4px;overflow:hidden}
.level-progress-bar{height:100%;background:linear-gradient(90deg,#00b6f9,#0090d9);border-radius:4px;transition:width .5s}
.level-stats{text-align:right}
.level-num{font-size:32px;font-weight:700;color:#00b6f9;line-height:1}
.level-label{font-size:12px;color:#5c6a7a}
.level-xp{font-size:13px;margin-top:4px}
.level-xp span{color:#00b6f9;font-weight:600}

.section{background:#171e28;border:1px solid rgba(115,130,153,0.15);border-radius:12px;padding:24px;margin-bottom:20px}
.section-title{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title i{color:#00b6f9}
.section-title .count{margin-left:auto;font-size:12px;color:#5c6a7a;font-weight:400}

.category-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.cat-tab{padding:8px 16px;background:#1b222f;border:1px solid rgba(115,130,153,0.15);border-radius:8px;color:#5c6a7a;font-size:13px;cursor:pointer;transition:all .2s;font-family:inherit;font-weight:600}
.cat-tab:hover{border-color:rgba(0,182,249,0.3);color:#d1d4dc}
.cat-tab.active{background:rgba(0,182,249,0.15);border-color:#00b6f9;color:#00b6f9}

.achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.achievement-card{background:#1b222f;border:1px solid rgba(115,130,153,0.15);border-radius:10px;padding:18px;display:flex;gap:14px;transition:all .2s;position:relative;overflow:hidden}
.achievement-card:hover{border-color:rgba(0,182,249,0.3);transform:translateY(-1px)}
.achievement-card.unlocked{border-color:rgba(69,183,52,0.3)}
.achievement-card.locked{opacity:0.6}
.achievement-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.achievement-card.unlocked .achievement-icon{background:rgba(69,183,52,0.15);color:#45b734}
.achievement-card.locked .achievement-icon{background:rgba(115,130,153,0.1);color:#3a4555}
.achievement-details{flex:1;min-width:0}
.achievement-details h4{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.achievement-details p{font-size:11px;color:#5c6a7a;margin-bottom:8px;line-height:1.4}
.achievement-progress{height:6px;background:rgba(115,130,153,0.15);border-radius:3px;overflow:hidden}
.achievement-progress-bar{height:100%;border-radius:3px;transition:width .5s}
.achievement-card.unlocked .achievement-progress-bar{background:#45b734}
.achievement-card.locked .achievement-progress-bar{background:#00b6f9}
.achievement-progress-text{font-size:10px;color:#5c6a7a;margin-top:4px;text-align:right}
.achievement-card .badge{position:absolute;top:10px;right:10px;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.achievement-card.unlocked .badge{background:rgba(69,183,52,0.15);color:#45b734}
.achievement-card.locked .badge{background:rgba(115,130,153,0.1);color:#3a4555}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">PO</div>
  <nav class="sidebar-nav">
    <a href="/pages/trading/" title="Trading"><i class="fas fa-chart-line"></i></a>
    <a href="/pages/cabinet/profile/" title="Profile"><i class="fas fa-user"></i></a>
    <a href="/pages/cabinet/deposit/" title="Deposit"><i class="fas fa-wallet"></i></a>
    <a href="/pages/cabinet/withdrawal/" title="Withdrawal"><i class="fas fa-arrow-up"></i></a>
    <a href="/pages/cabinet/history/" title="History"><i class="fas fa-history"></i></a>
    <a href="/pages/cabinet/achievements/" title="Achievements" class="active"><i class="fas fa-trophy"></i></a>
    <a href="/pages/cabinet/settings/" title="Settings"><i class="fas fa-cog"></i></a>
  </nav>
  <div class="sidebar-bottom">
    <a href="/pages/cabinet/settings/" title="Settings"><i class="fas fa-cog"></i></a>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">Achievements</span>
    </div>
    <div class="topbar-right">
      <div class="balance-display">
        <span class="balance-label">Balance</span>
        <span class="balance-value" id="topBalance">$10,000.00</span>
      </div>
      <button class="topbar-btn" title="Notifications"><i class="fas fa-bell"></i></button>
    </div>
  </header>

  <div class="content">
    <div class="page-header">
      <h1>Achievements</h1>
      <p>Track your progress and unlock rewards</p>
    </div>

    <div class="level-banner">
      <div class="level-badge">
        <div class="level-badge-inner" id="levelBadge">1</div>
      </div>
      <div class="level-info">
        <h2 id="levelTitle">Beginner Trader</h2>
        <p>Keep trading to level up and unlock exclusive rewards</p>
        <div class="level-progress">
          <div class="level-progress-bar" id="levelBar" style="width:15%"></div>
        </div>
        <div class="level-xp" style="margin-top:6px"><span id="currentXP">150</span> / <span id="nextXP">1000</span> XP</div>
      </div>
      <div class="level-stats">
        <div class="level-num" id="levelNum">1</div>
        <div class="level-label">Current Level</div>
      </div>
    </div>

    <div class="section">
      <div class="category-tabs" id="catTabs">
        <button class="cat-tab active" data-cat="all" onclick="filterCat(this,'all')">All</button>
        <button class="cat-tab" data-cat="trading" onclick="filterCat(this,'trading')">Trading</button>
        <button class="cat-tab" data-cat="deposit" onclick="filterCat(this,'deposit')">Deposits</button>
        <button class="cat-tab" data-cat="social" onclick="filterCat(this,'social')">Social</button>
        <button class="cat-tab" data-cat="special" onclick="filterCat(this,'special')">Special</button>
      </div>
      <div class="achievements-grid" id="achievementsGrid"></div>
    </div>
  </div>
</div>

<script src="/js/modules/api.js"></script>
<script>
if (!localStorage.getItem('po_logged_in')) {
  window.location.href = '/pages/login/';
}

const user = JSON.parse(localStorage.getItem('po_user') || '{"balance":10000}');
const trades = JSON.parse(localStorage.getItem('po_trades') || '[]');
const tradeOnly = trades.filter(t => t.type !== 'deposit' && t.type !== 'withdrawal');
const wins = tradeOnly.filter(t => t.status === 'win');
const deposits = trades.filter(t => t.type === 'deposit');
const totalDeposited = deposits.reduce((s, t) => s + (t.amount || 0), 0);

let userAchievements = JSON.parse(localStorage.getItem('po_achievements') || '{}');

const allAchievements = [
  {id:'first_trade',cat:'trading',icon:'fa-crosshairs',title:'First Trade',desc:'Complete your very first trade',goal:1,current:Math.min(tradeOnly.length,1)},
  {id:'trades_10',cat:'trading',icon:'fa-fire',title:'Getting Started',desc:'Complete 10 trades',goal:10,current:Math.min(tradeOnly.length,10)},
  {id:'trades_50',cat:'trading',icon:'fa-bolt',title:'Active Trader',desc:'Complete 50 trades',goal:50,current:Math.min(tradeOnly.length,50)},
  {id:'trades_100',cat:'trading',icon:'fa-crown',title:'Century Trader',desc:'Complete 100 trades',goal:100,current:Math.min(tradeOnly.length,100)},
  {id:'trades_500',cat:'trading',icon:'fa-gem',title:'Trading Master',desc:'Complete 500 trades',goal:500,current:Math.min(tradeOnly.length,500)},
  {id:'win_5',cat:'trading',icon:'fa-thumbs-up',title:'On a Roll',desc:'Win 5 trades',goal:5,current:Math.min(wins.length,5)},
  {id:'win_10',cat:'trading',icon:'fa-trophy',title:'Winner',desc:'Win 10 trades',goal:10,current:Math.min(wins.length,10)},
  {id:'win_streak',cat:'trading',icon:'fa-fire-flame-curved',title:'Win Streak',desc:'Win 5 trades in a row',goal:5,current:userAchievements.win_streak || 0},
  {id:'high_payout',cat:'trading',icon:'fa-sack-dollar',title:'Big Winner',desc:'Win a trade with $500+ payout',goal:1,current:tradeOnly.some(t=>t.status==='win'&&t.payout>=500)?1:0},
  {id:'first_deposit',cat:'deposit',icon:'fa-plus-circle',title:'First Deposit',desc:'Make your first deposit',goal:1,current:Math.min(deposits.length,1)},
  {id:'deposit_500',cat:'deposit',icon:'fa-piggy-bank',title:'Big Spender',desc:'Deposit a total of $500+',goal:500,current:Math.min(totalDeposited,500)},
  {id:'deposit_1000',cat:'deposit',icon:'fa-vault',title:'Gold Member',desc:'Deposit a total of $1,000+',goal:1000,current:Math.min(totalDeposited,1000)},
  {id:'deposit_5000',cat:'deposit',icon:'fa-coins',title:'VIP Trader',desc:'Deposit a total of $5,000+',goal:5000,current:Math.min(totalDeposited,5000)},
  {id:'profile_complete',cat:'social',icon:'fa-id-card',title:'Profile Complete',desc:'Fill in all profile information',goal:1,current:(user.firstName&&user.lastName&&user.email&&user.country)?1:0},
  {id:'first_friend',cat:'social',icon:'fa-user-plus',title:'Invite a Friend',desc:'Share your referral link',goal:1,current:userAchievements.first_friend||0},
  {id:'daily_login',cat:'special',icon:'fa-calendar-check',title:'Daily Login',desc:'Log in 7 days in a row',goal:7,current:Math.min(userAchievements.daily_logins||1,7)},
  {id:'early_bird',cat:'special',icon:'fa-sun',title:'Early Bird',desc:'Place a trade before 8:00 AM',goal:1,current:userAchievements.early_bird||0},
  {id:'night_owl',cat:'special',icon:'fa-moon',title:'Night Owl',desc:'Place a trade after midnight',goal:1,current:userAchievements.night_owl||0},
];

const levels = [
  {level:1,name:'Beginner Trader',xp:0},
  {level:2,name:'Novice Trader',xp:1000},
  {level:3,name:'Intermediate Trader',xp:3000},
  {level:4,name:'Advanced Trader',xp:7000},
  {level:5,name:'Expert Trader',xp:15000},
  {level:6,name:'Master Trader',xp:30000},
  {level:7,name:'Pro Trader',xp:60000},
  {level:8,name:'Elite Trader',xp:100000},
  {level:9,name:'Legend',xp:200000},
  {level:10,name:'Grandmaster',xp:500000},
];

function formatMoney(n) {
  return '$' + Number(n || 0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function getLevel() {
  let xp = tradeOnly.length * 10 + wins.length * 20 + deposits.length * 50 + Math.floor(totalDeposited / 10);
  let current = levels[0];
  let next = levels[1];
  for (let i = levels.length - 1; i >= 0; i--) {
    if (xp >= levels[i].xp) {
      current = levels[i];
      next = levels[i + 1] || levels[i];
      break;
    }
  }
  const progress = current.xp === next.xp ? 100 : Math.min(100, Math.round(((xp - current.xp) / (next.xp - current.xp)) * 100));
  return {level: current.level, name: current.name, xp: xp, nextXP: next.xp, progress: progress};
}

let currentCat = 'all';

function init() {
  document.getElementById('topBalance').textContent = formatMoney(user.balance);
  const lv = getLevel();
  document.getElementById('levelBadge').textContent = lv.level;
  document.getElementById('levelNum').textContent = lv.level;
  document.getElementById('levelTitle').textContent = lv.name;
  document.getElementById('currentXP').textContent = lv.xp.toLocaleString();
  document.getElementById('nextXP').textContent = lv.nextXP.toLocaleString();
  document.getElementById('levelBar').style.width = lv.progress + '%';
  renderAchievements();
}

function filterCat(btn, cat) {
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = cat;
  renderAchievements();
}

function renderAchievements() {
  const grid = document.getElementById('achievementsGrid');
  const filtered = currentCat === 'all' ? allAchievements : allAchievements.filter(a => a.cat === currentCat);
  const unlocked = filtered.filter(a => a.current >= a.goal).length;

  grid.innerHTML = filtered.map(a => {
    const isUnlocked = a.current >= a.goal;
    const pct = Math.min(100, Math.round((a.current / a.goal) * 100));
    return '<div class="achievement-card ' + (isUnlocked ? 'unlocked' : 'locked') + '"><div class="achievement-icon"><i class="fas ' + a.icon + '"></i></div><div class="achievement-details"><h4>' + a.title + '</h4><p>' + a.desc + '</p><div class="achievement-progress"><div class="achievement-progress-bar" style="width:' + pct + '%"></div></div><div class="achievement-progress-text">' + Math.min(a.current, a.goal) + ' / ' + a.goal + '</div></div><span class="badge">' + (isUnlocked ? 'Unlocked' : 'Locked') + '</span></div>';
  }).join('');
}

init();
</script>
</body>
</html>
