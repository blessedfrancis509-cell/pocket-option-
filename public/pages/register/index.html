<!DOCTYPE html>
<html class="theme-dark-blue" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration | Pocket Option</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/pocketoption/favicon.ico">
    <link rel="stylesheet" href="/plugins/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="/themes/cabinet-vite/vendors/fonts.css">
    <link rel="stylesheet" href="/css/mobile.css">
    <link rel="stylesheet" href="/css/desktop-theme-dark-blue.css">
    <link rel="stylesheet" href="/css/mobile-theme-dark-blue.css">
    <link rel="stylesheet" href="/platform/main.css">
    <style>
        body { background: #1b222f; color: #d1d4dc; font-family: 'Open Sans', sans-serif; margin: 0; }
        .reg-layout { min-height: 100vh; display: flex; }
        .reg-left { flex: 1; background: linear-gradient(135deg, #0f1520 0%, #1b222f 50%, #0f1520 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .reg-left::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: url('/assets/images/body/mountains-dark-blue.jpg') center/cover; opacity: 0.15; }
        .reg-left-content { position: relative; z-index: 1; text-align: center; padding: 40px; }
        .reg-left-content h2 { font-size: 28px; color: #fff; margin-bottom: 12px; }
        .reg-left-content p { font-size: 14px; color: #888A95; line-height: 1.6; }
        .reg-right { width: 480px; background: #171e28; display: flex; flex-direction: column; justify-content: center; padding: 48px; }
        .reg-logo { margin-bottom: 32px; }
        .reg-logo img { height: 36px; }
        .reg-title { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .reg-subtitle { font-size: 13px; color: #888A95; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; color: #888A95; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; height: 44px; background: rgba(115,130,153,0.1); border: 1px solid rgba(115,130,153,0.15); border-radius: 8px; padding: 0 14px; color: #fff; font-size: 14px; outline: none; transition: border-color 0.15s; }
        .form-control:focus { border-color: #00b6f9; background: rgba(0,153,250,0.05); }
        .form-control::placeholder { color: #555; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .checkbox-label { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; }
        .checkbox-label input { margin-top: 3px; accent-color: #00b6f9; }
        .checkbox-label span { font-size: 12px; color: #888A95; line-height: 1.5; }
        .checkbox-label a { color: #00b6f9; text-decoration: none; }
        .btn-register { width: 100%; height: 48px; background: #00b6f9; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s; margin-top: 8px; }
        .btn-register:hover { background: #00a0e0; }
        .btn-register:disabled { opacity: 0.6; cursor: not-allowed; }
        .reg-divider { text-align: center; margin: 24px 0; position: relative; }
        .reg-divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(115,130,153,0.15); }
        .reg-divider span { position: relative; background: #171e28; padding: 0 12px; font-size: 12px; color: #888A95; }
        .social-btns { display: flex; gap: 10px; }
        .social-btn { flex: 1; height: 44px; border: 1px solid rgba(115,130,153,0.2); border-radius: 8px; background: transparent; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: background 0.15s; color: #d1d4dc; font-size: 13px; font-weight: 600; }
        .social-btn:hover { background: rgba(115,130,153,0.1); }
        .reg-footer { margin-top: 24px; text-align: center; font-size: 13px; color: #888A95; }
        .reg-footer a { color: #00b6f9; text-decoration: none; }
        .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #888A95; }
        .input-wrap { position: relative; }
        .error-msg { font-size: 12px; color: #ff3e1f; margin-top: 4px; display: none; }
        @media (max-width: 768px) {
            .reg-left { display: none; }
            .reg-right { width: 100%; padding: 32px 20px; }
        }
    </style>
</head>
<body>
    <div class="reg-layout">
        <div class="reg-left">
            <div class="reg-left-content">
                <h2>Start Trading Now</h2>
                <p>Join millions of traders worldwide.<br>Practice with $10,000 demo balance.<br>Start with real money from just $1.</p>
            </div>
        </div>
        <div class="reg-right">
            <div class="reg-logo">
                <a href="/"><img src="/themes/cabinet/images/logo.svg" alt="Pocket Option"></a>
            </div>
            <h1 class="reg-title">Create Account</h1>
            <p class="reg-subtitle">Fill in the details below to get started</p>
            
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" id="firstName" placeholder="First name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastName" placeholder="Last name" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrap">
                        <input type="password" class="form-control" id="password" placeholder="Create a password" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePass()">
                            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 5C12.7614 5 15.238 6.579 17 9C15.238 11.421 12.7614 13 10 13C7.23858 13 4.76196 11.421 3 9C4.76196 6.579 7.23858 5 10 5ZM10 7C8.34315 7 7 8.34315 7 10C7 11.6569 8.34315 13 10 13C11.6569 13 13 11.6569 13 10C13 8.34315 11.6569 7 10 7Z" stroke="currentColor" stroke-width="1.5"/></svg>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Country</label>
                    <select class="form-control" id="country" style="appearance:auto">
                        <option value="US">United States</option>
                        <option value="GB">United Kingdom</option>
                        <option value="NG" selected>Nigeria</option>
                        <option value="ZA">South Africa</option>
                        <option value="KE">Kenya</option>
                        <option value="IN">India</option>
                        <option value="BR">Brazil</option>
                        <option value="DE">Germany</option>
                        <option value="FR">France</option>
                        <option value="AU">Australia</option>
                        <option value="CA">Canada</option>
                        <option value="JP">Japan</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" required>
                        <span>I agree to the <a href="/terms/">Terms & Conditions</a> and <a href="/privacy/">Privacy Policy</a></span>
                    </label>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="age" required>
                        <span>I confirm that I am at least 18 years old</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-register" id="regBtn">Create Account</button>
            </form>
            
            <div class="reg-divider"><span>or continue with</span></div>
            
            <div class="social-btns">
                <button class="social-btn"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Google</button>
                <button class="social-btn"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#3b5998" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.046V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg> Facebook</button>
            </div>
            
            <div class="reg-footer">
                Already have an account? <a href="/pages/login/">Sign in</a>
            </div>
        </div>
    </div>
    
    <script src="/js/modules/api.js"></script>
    <script>
        function togglePass() {
            const el = document.getElementById('password');
            el.type = el.type === 'password' ? 'text' : 'password';
        }
        
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.textContent = 'Creating account...';
            btn.disabled = true;
            
            try {
                const result = await POAPI.register({
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    country: document.getElementById('country').value,
                    currency: 'USD'
                });
                localStorage.setItem('po_logged_in', 'true');
                window.location.href = '/cabinet/trading/';
            } catch(err) {
                alert(err.message);
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
