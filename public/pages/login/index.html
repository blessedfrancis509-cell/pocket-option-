    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('loginForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const btn = form.querySelector('.js-login-btn');
                    const originalText = btn.textContent;
                    btn.textContent = 'Signing in...';
                    btn.disabled = true;

                    // Simulate login
                    setTimeout(function() {
                        localStorage.setItem('po_logged_in', 'true');
                    localStorage.setItem('po_user_email', form.email.value);
                    window.location.href = '/cabinet/trading/';
                    }, 1500);
                });
            }

            // Toggle password visibility
            document.querySelectorAll('.btn_toggle-password').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const target = document.getElementById(this.dataset.target);
                    if (target.type === 'password') {
                        target.type = 'text';
                        this.innerHTML = '<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 15C12.7614 15 15.238 13.421 17 11C15.238 8.579 12.7614 7 10 7C7.23858 7 4.76196 8.579 3 11C4.76196 13.421 7.23858 15 10 15ZM10 9C11.6569 9 13 10.3431 13 12C13 13.6569 11.6569 15 10 15C8.34315 15 7 13.6569 7 12C7 10.3431 8.34315 9 10 9Z" stroke="currentColor" stroke-width="1.5"/><path d="M1 1L19 19" stroke="currentColor" stroke-width="1.5"/></svg>';
                    } else {
                        target.type = 'password';
                        this.innerHTML = '<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 5C12.7614 5 15.238 6.579 17 9C15.238 11.421 12.7614 13 10 13C7.23858 13 4.76196 11.421 3 9C4.76196 6.579 7.23858 5 10 5ZM10 7C8.34315 7 7 8.34315 7 10C7 11.6569 8.34315 13 10 13C11.6569 13 13 11.6569 13 10C13 8.34315 11.6569 7 10 7Z" stroke="currentColor" stroke-width="1.5"/></svg>';
                    }
                });
            });
        });
    </script>
